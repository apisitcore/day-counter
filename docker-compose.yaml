services:
  app:
    image: day-counter:latest

    ports:
      - "3000:3000"
    environment:
      - PERSON_NAME_1=Person1
      - PERSON_BIRTHDAY_1=2026-03-01
      - PERSON_NAME_2=Person1
      - PERSON_BIRTHDAY_2=2026-03-01
      - ANNIVERSARY=2026-03-01

    volumes:
      - ./assets:/app/assets:ro
    restart: unless-stopped
